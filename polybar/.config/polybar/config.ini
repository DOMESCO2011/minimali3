[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
primary = #7aa2f7
secondary = #bb9af7
alert = #f7768e
disabled = #565f89

[bar/main]
width = 100%
height = 26pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = "Cascadia Code:size=10;3"
font-1 = "Font Awesome 6 Free Solid:size=11;3"

# Itt hozzáadtuk a network modult a jobb oldalra
modules-left = xworkspaces
modules-center = date
modules-right = network pulseaudio memory cpu bat

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 2
label-occupied = %name%
label-occupied-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/network]
type = internal/network
# Itt add meg a hálózati kártyád nevét (pl. wlan0 vagy eth0). 
# Ha üresen hagyod, megpróbálja kitalálni.
interface-type = wireless
interval = 1.0
# Letöltés és feltöltés kijelzése ikonokkal
format-connected = <label-connected>
format-connected-prefix = ""
format-connected-prefix-foreground = ${colors.primary}
label-connected = " %downspeed%  %upspeed%"
label-connected-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
# Ez korlátozza a hangerőt 100%-ra
use-ui-max = false
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = "MUTED"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/bat]
type = internal/battery    
interval = 2
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
